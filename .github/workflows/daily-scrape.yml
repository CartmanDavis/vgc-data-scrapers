name: Daily Scrape

on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC daily
  workflow_dispatch:       # allow manual runs

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Write config
        run: echo '${{ secrets.CONFIG_JSON }}' > config.json

      - name: Ensure valid SQLite DB
        run: sqlite3 db/vgc.db "SELECT 1" 2>/dev/null

      - name: Scrape M-A tournaments
        run: pnpm --filter @vgc/cli run limitless --format M-A

      - name: Process new data
        run: pnpm --filter @vgc/cli run process

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/vgc.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily scrape $(date -u '+%Y-%m-%d')"
            git push
          fi
